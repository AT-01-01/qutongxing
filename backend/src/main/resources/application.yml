server:
  port: 8086
  address: 0.0.0.0
  tomcat:
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 20000
    max-connections: 8192
    accept-count: 100

spring:
  datasource:
    # 使用独立业务库 qutongxing，避免与其他项目表结构互相影响。
    url: jdbc:postgresql://127.0.0.1:5210/qutongxing
    username: Admin
    password: Admin
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000
      pool-name: QuTongXingHikariPool

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: qutongxing_secret_key_2024_may_be_very_long_and_secure
  expiration: 86400000

amap:
  web-key: ""

logging:
  level:
    com.example.qutongxing: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN